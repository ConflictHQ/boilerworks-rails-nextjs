default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://boilerworks:boilerworks@localhost:5444/boilerworks_development") %>

test:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://boilerworks:boilerworks@localhost:5444/boilerworks_test") %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
